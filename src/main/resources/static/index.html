<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大模型聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        .container {
            width: 400px;
            height: 600px;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            overflow: hidden;
            z-index: 1000;
        }
        
        .header {
            background-color: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-container {
            height: calc(100% - 140px);
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        
        .user-message {
            justify-content: flex-end;
        }
        
        .bot-message {
            justify-content: flex-start;
        }
        
        .avatar-placeholder {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #e0e0e0;
            flex-shrink: 0;
        }
        
        .user-avatar {
            margin-left: 10px;
        }
        
        .bot-avatar {
            margin-right: 10px;
        }
        
        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
        }
        
        .user-content {
            background-color: #007bff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .bot-content {
            background-color: #f1f1f1;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        
        .input-container {
            display: flex;
            padding: 15px;
            border-top: 1px solid #eee;
        }
        
        .input-field {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }
        
        .send-button {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 0 20px;
            margin-left: 10px;
            cursor: pointer;
        }
        
        .send-button:hover {
            background-color: #0069d9;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>大模型聊天</h1>
        </div>
        <div class="chat-container" id="chatContainer">
            <div class="message bot-message">
                <div class="avatar-placeholder bot-avatar"></div>
                <div class="message-content bot-content">
                    你好！我是大模型助手，有什么可以帮助你的吗？
                </div>
            </div>
        </div>
        <div class="input-container">
            <input type="text" class="input-field" id="messageInput" placeholder="请输入消息...">
            <button class="send-button" id="sendButton">发送</button>
        </div>
    </div>
    
    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        
        function addMessage(message, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = isUser ? 'message user-message' : 'message bot-message';
            
            // 创建头像占位符
            const avatarDiv = document.createElement('div');
            avatarDiv.className = `avatar-placeholder ${isUser ? 'user-avatar' : 'bot-avatar'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = isUser ? 'message-content user-content' : 'message-content bot-content';
            contentDiv.textContent = message;
            
            if (isUser) {
                messageDiv.appendChild(contentDiv);
                messageDiv.appendChild(avatarDiv);
            } else {
                messageDiv.appendChild(avatarDiv);
                messageDiv.appendChild(contentDiv);
            }
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function sendMessage() {
            const message = messageInput.value.trim();
            if (message) {
                addMessage(message, true);
                messageInput.value = '';
                
                // 创建机器人消息容器
                const botMessageDiv = document.createElement('div');
                botMessageDiv.className = 'message bot-message';
                
                // 创建头像占位符
                const botAvatarDiv = document.createElement('div');
                botAvatarDiv.className = 'avatar-placeholder bot-avatar';
                
                const botContentDiv = document.createElement('div');
                botContentDiv.className = 'message-content bot-content';
                botContentDiv.textContent = '';
                
                botMessageDiv.appendChild(botAvatarDiv);
                botMessageDiv.appendChild(botContentDiv);
                chatContainer.appendChild(botMessageDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                
                // 发送请求到后端流式接口
                console.log('Sending message:', message);
                
                // 使用流式API
                fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: message })
                })
                .then(response => {
                    console.log('Response status:', response.status);
                    if (!response.ok) {
                        throw new Error('Response not ok');
                    }
                    
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let accumulatedResponse = '';
                    
                    function processStream() {
                        return reader.read().then(({ done, value }) => {
                            if (done) {
                                console.log('Stream complete');
                                return;
                            }
                            
                            const chunk = decoder.decode(value, { stream: true });
                            console.log('Received chunk:', chunk);
                            
                            // 解析SSE格式数据
                            const lines = chunk.split('\n');
                            for (const line of lines) {
                                if (line.startsWith('data:')) {
                                    const content = line.substring(5).trim();
                                    if (content) {
                                        accumulatedResponse += content;
                                    }
                                }
                            }
                            
                            // 更新机器人消息内容
                            botContentDiv.textContent = accumulatedResponse;
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                            
                            return processStream();
                        });
                    }
                    
                    return processStream();
                })
                .catch(error => {
                    console.error('Error:', error);
                    botContentDiv.textContent = '抱歉，出现了错误，请稍后再试。';
                });
            }
        }
        
        sendButton.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
